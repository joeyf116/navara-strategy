name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_terraform:
        description: "Skip Terraform (infra already up-to-date)"
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  TERRAFORM_VERSION: "1.8.5"
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }} # e.g. navara-sftp
  APPRUNNER_SERVICE_ARN: ${{ vars.APPRUNNER_SERVICE_ARN }}

permissions:
  id-token: write # required for OIDC token exchange
  contents: read

# ──────────────────────────────────────────────────────────────────────────────
jobs:
  # ──────────────────────────────────────────────────────────────────────────────

  # ---------------------------------------------------------------------------
  # 1. CI gate – lint, type-check, build (reuses existing ci.yml logic inline)
  # ---------------------------------------------------------------------------
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Provide dummy values so Next.js build does not fail on missing env
          NEXTAUTH_SECRET: build-time-placeholder
          NEXTAUTH_URL: http://localhost:3000

  # ---------------------------------------------------------------------------
  # 2. Build & push Docker image to ECR
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        id: image
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "uri=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "latest=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ steps.image.outputs.uri }}" \
            --tag "${{ env.latest }}" \
            --cache-from "${{ env.latest }}" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .
        env:
          DOCKER_BUILDKIT: 1

      - name: Push image to ECR
        run: |
          docker push "${{ steps.image.outputs.uri }}"
          docker push "${{ env.latest }}"

  # ---------------------------------------------------------------------------
  # 3. Terraform – provision / update infrastructure
  # ---------------------------------------------------------------------------
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build-push
    if: ${{ !inputs.skip_terraform }}
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="app_image_identifier=${{ needs.build-push.outputs.image_uri }}" \
            -var="transfer_user_public_key=${{ secrets.SFTP_USER_PUBLIC_KEY }}" \
            -out=tfplan \
            -detailed-exitcode
        continue-on-error: true # exit 2 means changes present – not an error

      - name: Terraform Apply
        if: steps.plan.outputs.exitcode != '1'
        run: terraform apply -auto-approve tfplan

  # ---------------------------------------------------------------------------
  # 4. Deploy – trigger App Runner to pull the new image
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy App Runner
    runs-on: ubuntu-latest
    needs: [build-push, terraform]
    if: always() && needs.build-push.result == 'success'

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger App Runner deployment
        run: |
          aws apprunner start-deployment \
            --service-arn "${{ env.APPRUNNER_SERVICE_ARN }}"

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for App Runner service to reach RUNNING state..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "${{ env.APPRUNNER_SERVICE_ARN }}" \
              --query "Service.Status" \
              --output text)
            echo "  attempt $i/30 – status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "Deployment succeeded."
              exit 0
            fi
            if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "UPDATE_FAILED" ]; then
              echo "Deployment failed with status: $STATUS"
              exit 1
            fi
            sleep 20
          done
          echo "Timed out waiting for deployment."
          exit 1
